<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 110">
  <defs>
    <linearGradient id="gear-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#555d68"/>
      <stop offset="100%" stop-color="#3a4048"/>
    </linearGradient>
    <linearGradient id="globe-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b6a87"/>
      <stop offset="100%" stop-color="#0c4d68"/>
    </linearGradient>
    <linearGradient id="grass-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6fbf3b"/>
      <stop offset="100%" stop-color="#3f9a1e"/>
    </linearGradient>
    <linearGradient id="soil-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c89838"/>
      <stop offset="100%" stop-color="#a87828"/>
    </linearGradient>
    <linearGradient id="deep-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a5e28"/>
      <stop offset="100%" stop-color="#7a4418"/>
    </linearGradient>
  </defs>

  <!-- Gear (half, left side) - dark charcoal steel -->
  <g transform="translate(35,42)">
    <path d="M2-34 L-2-42 l-8 1-2 8-8-3-3-7-8 3 0 9-7 2-4-7-8 5 2 8-6 4-6-5-6 6 5 6-3 7-8-1-2 8 7 4 0 8-8 1-1 9 8 3 2 7-7 4-1 9 9 0 3 7-6 5 1 10 8-1 3-8" fill="url(#gear-g)" stroke="#2e343c" stroke-width="1.2" stroke-linejoin="round"/>
    <circle r="20" fill="white" stroke="#cdd3da" stroke-width="0.8"/>
  </g>

  <!-- Globe - solid dark teal -->
  <g transform="translate(48,28)">
    <circle r="18" fill="url(#globe-g)"/>
    <circle r="18" fill="none" stroke="#0f4458" stroke-width="1.2"/>
    <ellipse rx="7.5" ry="18" fill="none" stroke="#4eaac8" stroke-width="0.7" opacity="0.8"/>
    <ellipse rx="13" ry="18" fill="none" stroke="#4eaac8" stroke-width="0.5" opacity="0.5"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="#4eaac8" stroke-width="0.7" opacity="0.8"/>
    <path d="M-17-7 Q0-9 17-7" fill="none" stroke="#4eaac8" stroke-width="0.5" opacity="0.55"/>
    <path d="M-17 7 Q0 9 17 7" fill="none" stroke="#4eaac8" stroke-width="0.5" opacity="0.55"/>
    <line x1="0" y1="-18" x2="0" y2="18" stroke="#4eaac8" stroke-width="0.5" opacity="0.5"/>
  </g>

  <!-- 3D Isometric soil block - vivid layers -->
  <g transform="translate(50,70)">
    <!-- Top face (grass green) -->
    <path d="M0-12 L26 0 L0 12 L-26 0 Z" fill="url(#grass-g)" stroke="#3a8a1a" stroke-width="0.6"/>
    <!-- Right face (tan/orange soil) -->
    <path d="M0 12 L26 0 L26 10 L0 22 Z" fill="url(#soil-g)" stroke="#8a6818" stroke-width="0.5"/>
    <!-- Left face (dark brown) -->
    <path d="M0 12 L-26 0 L-26 10 L0 22 Z" fill="url(#deep-g)" stroke="#6a3a10" stroke-width="0.5"/>
    <!-- Grass highlight -->
    <path d="M-12-2 L0-8 L12-2" fill="none" stroke="#90d860" stroke-width="0.5" opacity="0.5"/>
    <!-- Soil layer lines -->
    <path d="M0 17 L26 5" stroke="#c89838" stroke-width="0.4" opacity="0.5"/>
    <path d="M0 17 L-26 5" stroke="#885020" stroke-width="0.4" opacity="0.5"/>
  </g>

  <!-- "GeoLearn" text - Geo is dark, Learn is teal -->
  <text x="100" y="48" font-family="'Segoe UI','Helvetica Neue','Arial',sans-serif" font-size="38" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#2a3440">Geo</tspan><tspan fill="#1b6a87">Learn</tspan>
  </text>

  <!-- "BY MYO_Geo_Orgs TM" -->
  <text x="100" y="74" font-family="'Segoe UI','Helvetica Neue','Arial',sans-serif" font-size="16" font-weight="700" fill="#3a4450" letter-spacing="1.8">
    BY MYO_Geo_Orgs<tspan font-size="9" baseline-shift="super">&#x2122;</tspan>
  </text>
</svg>
