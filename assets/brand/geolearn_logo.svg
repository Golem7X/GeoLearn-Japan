<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="gear-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a8494"/>
      <stop offset="100%" stop-color="#4a5568"/>
    </linearGradient>
    <linearGradient id="globe-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a6b8a"/>
      <stop offset="100%" stop-color="#0d4a65"/>
    </linearGradient>
    <linearGradient id="grass-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ecb56"/>
      <stop offset="100%" stop-color="#4ea832"/>
    </linearGradient>
    <linearGradient id="soil-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a84a"/>
      <stop offset="100%" stop-color="#b8862e"/>
    </linearGradient>
    <linearGradient id="deep-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b07038"/>
      <stop offset="100%" stop-color="#8a5020"/>
    </linearGradient>
  </defs>

  <!-- Half-gear (left side) -->
  <g transform="translate(38,48)">
    <path d="M2-36 L-3-44 l-8 2-2 8-8-4-4-7-8 4 1 9-7 2-5-7-7 5 3 8-6 4-7-5-5 7 5 6-3 7-8-2-3 8 7 5 0 7-8 1-1 9 8 3 2 7-7 4 0 9 8 0 4 6-6 6 2 9 7-2 3-8" fill="url(#gear-g)" stroke="#5a6570" stroke-width="0.8" stroke-linejoin="round"/>
    <circle r="21" fill="#f0f4f8" stroke="#b0bcc8" stroke-width="1"/>
  </g>

  <!-- Globe -->
  <g transform="translate(50,33)">
    <circle r="19" fill="url(#globe-g)" opacity="0.95"/>
    <circle r="19" fill="none" stroke="#15586e" stroke-width="1.4"/>
    <ellipse rx="8" ry="19" fill="none" stroke="#3aa0c4" stroke-width="0.8" opacity="0.7"/>
    <ellipse rx="14" ry="19" fill="none" stroke="#3aa0c4" stroke-width="0.5" opacity="0.5"/>
    <line x1="-19" y1="0" x2="19" y2="0" stroke="#3aa0c4" stroke-width="0.8" opacity="0.7"/>
    <path d="M-18-7 Q0-9 18-7" fill="none" stroke="#3aa0c4" stroke-width="0.5" opacity="0.5"/>
    <path d="M-18 7 Q0 9 18 7" fill="none" stroke="#3aa0c4" stroke-width="0.5" opacity="0.5"/>
    <line x1="0" y1="-19" x2="0" y2="19" stroke="#3aa0c4" stroke-width="0.5" opacity="0.5"/>
  </g>

  <!-- 3D Isometric soil block -->
  <g transform="translate(52,76)">
    <path d="M0-13 L28 0 L0 13 L-28 0 Z" fill="url(#grass-g)" stroke="#4ea832" stroke-width="0.5"/>
    <path d="M0 13 L28 0 L28 11 L0 24 Z" fill="url(#soil-g)" stroke="#a07828" stroke-width="0.4"/>
    <path d="M0 13 L-28 0 L-28 11 L0 24 Z" fill="url(#deep-g)" stroke="#7a4818" stroke-width="0.4"/>
    <path d="M-13-3 L0-9 L13-3" fill="none" stroke="#9adf7a" stroke-width="0.4" opacity="0.6"/>
    <path d="M0 19 L28 6" stroke="#d4a84a" stroke-width="0.4" opacity="0.6"/>
    <path d="M0 19 L-28 6" stroke="#a06830" stroke-width="0.4" opacity="0.6"/>
  </g>

  <!-- GeoLearn text -->
  <text x="108" y="52" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="38" font-weight="700" fill="#1a2332" letter-spacing="-0.5">
    <tspan>Geo</tspan><tspan fill="#1a6b8a">Learn</tspan>
  </text>

  <!-- BY MYO_Geo_Orgs -->
  <text x="108" y="78" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="600" fill="#5a6570" letter-spacing="1.5">
    BY MYO_Geo_Orgs<tspan font-size="10" dy="-6">TM</tspan>
  </text>
</svg>
