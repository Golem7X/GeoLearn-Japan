<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="gear-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#555d68"/>
      <stop offset="100%" stop-color="#3a4048"/>
    </linearGradient>
    <linearGradient id="globe-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b6a87"/>
      <stop offset="100%" stop-color="#0c4d68"/>
    </linearGradient>
    <linearGradient id="grass-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6fbf3b"/>
      <stop offset="100%" stop-color="#3f9a1e"/>
    </linearGradient>
    <linearGradient id="soil-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c89838"/>
      <stop offset="100%" stop-color="#a87828"/>
    </linearGradient>
    <linearGradient id="deep-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a5e28"/>
      <stop offset="100%" stop-color="#7a4418"/>
    </linearGradient>
  </defs>

  <!-- Gear - dark charcoal steel -->
  <g transform="translate(42,48)">
    <path d="M2-36 L-2-44 l-8 1-2 8-8-3-3-7-8 3 0 9-7 2-4-7-8 5 2 8-6 4-6-5-6 6 5 6-3 7-8-1-2 8 7 4 0 8-8 1-1 9 8 3 2 7-7 4-1 9 9 0 3 7-6 5 1 10 8-1 3-8" fill="url(#gear-g)" stroke="#2e343c" stroke-width="1.2" stroke-linejoin="round"/>
    <circle r="22" fill="white" stroke="#cdd3da" stroke-width="0.8"/>
  </g>

  <!-- Globe - solid dark teal -->
  <g transform="translate(55,33)">
    <circle r="20" fill="url(#globe-g)"/>
    <circle r="20" fill="none" stroke="#0f4458" stroke-width="1.2"/>
    <ellipse rx="8" ry="20" fill="none" stroke="#4eaac8" stroke-width="0.7" opacity="0.8"/>
    <ellipse rx="14" ry="20" fill="none" stroke="#4eaac8" stroke-width="0.5" opacity="0.5"/>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#4eaac8" stroke-width="0.7" opacity="0.8"/>
    <path d="M-19-7 Q0-9 19-7" fill="none" stroke="#4eaac8" stroke-width="0.5" opacity="0.55"/>
    <path d="M-19 7 Q0 9 19 7" fill="none" stroke="#4eaac8" stroke-width="0.5" opacity="0.55"/>
    <line x1="0" y1="-20" x2="0" y2="20" stroke="#4eaac8" stroke-width="0.5" opacity="0.5"/>
  </g>

  <!-- 3D Isometric soil block - vivid -->
  <g transform="translate(58,78)">
    <path d="M0-14 L30 0 L0 14 L-30 0 Z" fill="url(#grass-g)" stroke="#3a8a1a" stroke-width="0.6"/>
    <path d="M0 14 L30 0 L30 12 L0 26 Z" fill="url(#soil-g)" stroke="#8a6818" stroke-width="0.5"/>
    <path d="M0 14 L-30 0 L-30 12 L0 26 Z" fill="url(#deep-g)" stroke="#6a3a10" stroke-width="0.5"/>
    <path d="M-14-3 L0-10 L14-3" fill="none" stroke="#90d860" stroke-width="0.5" opacity="0.5"/>
    <path d="M0 20 L30 6" stroke="#c89838" stroke-width="0.4" opacity="0.5"/>
    <path d="M0 20 L-30 6" stroke="#885020" stroke-width="0.4" opacity="0.5"/>
  </g>
</svg>
