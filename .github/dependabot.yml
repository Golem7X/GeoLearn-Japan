## Dependabot configuration
## Automatically creates PRs when dependencies have vulnerabilities or updates.
## Reference: https://docs.github.com/en/code-security/dependabot

version: 2

updates:
  ## ── npm dependencies ─────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "security"
      - "dependencies"
    reviewers:
      - "Golem7X"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(dev-deps)"
      include: "scope"
    ignore:
      ## Only auto-update patch versions for major packages
      ## Major version bumps need manual review
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      ## Group all dev dependencies into a single PR
      dev-dependencies:
        dependency-type: "development"

  ## ── GitHub Actions ───────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    labels:
      - "security"
      - "ci"
    commit-message:
      prefix: "ci(deps)"
