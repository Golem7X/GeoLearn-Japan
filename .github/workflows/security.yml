## ═══════════════════════════════════════════════════════════════
## GeoLearn Japan — Security CI Pipeline
## Runs on every push, PR, and weekly schedule.
## Implements: CodeQL · Secret Scanning · Security Header Audit ·
##             Dependency Audit · HTML Security Validation
## ═══════════════════════════════════════════════════════════════

name: Security Scan

on:
  push:
    branches:
      - master
      - "claude/**"
  pull_request:
    branches:
      - master
  schedule:
    ## Weekly scan every Monday 09:00 JST (00:00 UTC)
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  ## ── 1. Security Header & CSP Validation ─────────────────────────────────
  security-audit:
    name: Security Header Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run security checks
        run: node scripts/security-check.js

      - name: Verify CSP hashes match inline scripts
        run: node scripts/verify-csp-hashes.js

      - name: Check for HTTP resources (mixed content)
        run: |
          echo "Checking for non-HTTPS external resources..."
          ## Use a safe quoting approach to avoid shell quoting issues
          if node -e "
            const fs = require('fs');
            const html = fs.readFileSync('index.html', 'utf8');
            const matches = html.match(/(?:src|href)=['\"]http:\/\/[^'\"]+/g) || [];
            if (matches.length > 0) { console.log(matches.join('\n')); process.exit(1); }
          "; then
            echo "✅ All external resources use HTTPS"
          else
            echo "❌ Found HTTP (non-secure) resources!"
            exit 1
          fi

      - name: Check for inline event handlers
        run: |
          echo "Checking for inline event handlers in HTML body (before first script tag)..."
          node -e "
            const fs = require('fs');
            const html = fs.readFileSync('index.html', 'utf8');
            const scriptPos = html.indexOf('<script>');
            const htmlBody = html.substring(0, scriptPos);
            // Check only onclick — other handlers (onchange, onerror, onkeydown) are now
            // converted to data-change, data-error, data-keydown attributes.
            // onfocus/onblur are handled purely via CSS :focus rules.
            const pattern = /\bon(click)=/g;
            const matches = htmlBody.match(pattern) || [];
            if (matches.length > 0) {
              console.error('FAIL: Found ' + matches.length + ' inline onclick handler(s)');
              process.exit(1);
            }
            console.log('PASS: No inline onclick handlers found in HTML body');
          "

  ## ── 2. Secret Scanning ──────────────────────────────────────────────────
  secret-scan:
    name: Secret & API Key Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for secret detection)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Check for hardcoded secret patterns
        run: |
          echo "Scanning for common secret patterns..."
          node -e "
            const fs   = require('fs');
            const html = fs.existsSync('index.html') ? fs.readFileSync('index.html','utf8') : '';
            const patterns = [
              [/AKIA[0-9A-Z]{16}/,          'AWS Access Key'],
              [/sk-[a-zA-Z0-9]{32,}/,       'OpenAI API key'],
              [/ghp_[a-zA-Z0-9]{36}/,       'GitHub Personal Access Token'],
              [/-----BEGIN (RSA|EC) PRIVATE KEY-----/, 'Private key material'],
            ];
            let found = 0;
            for (const [re, name] of patterns) {
              if (re.test(html)) { console.error('SECRET FOUND: ' + name); found++; }
            }
            if (found === 0) console.log('PASS: No secret patterns detected');
            else process.exit(1);
          "

  ## ── 3. CodeQL Static Analysis ───────────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript
          ## Use our custom config that suppresses DOMPurify false positives
          config-file: .github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript"
          upload: always

  ## ── 4. Dependency Vulnerability Audit ───────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Audit npm dependencies
        run: |
          echo "Running npm audit..."
          ## Write audit report and parse it with Node using fs.readFileSync (not require)
          ## to avoid module resolution issues in inline scripts
          npm audit --json > audit-report.json 2>&1 || true
          node -e "
            const fs = require('fs');
            let report;
            try {
              report = JSON.parse(fs.readFileSync('audit-report.json', 'utf8'));
            } catch(e) {
              console.log('WARN: Could not parse audit report:', e.message);
              process.exit(0);
            }
            const meta  = report.metadata || {};
            const vulns = meta.vulnerabilities || {};
            console.log('Vulnerability summary:');
            console.log('  Critical:', vulns.critical || 0);
            console.log('  High:    ', vulns.high     || 0);
            console.log('  Moderate:', vulns.moderate || 0);
            console.log('  Low:     ', vulns.low      || 0);
            if ((vulns.critical || 0) > 0 || (vulns.high || 0) > 0) {
              console.error('FAIL: Critical or high severity vulnerabilities found!');
              process.exit(1);
            }
            console.log('PASS: No critical/high vulnerabilities');
          "

      - name: Verify zero external script dependencies
        run: |
          node -e "
            const fs   = require('fs');
            const html = fs.readFileSync('index.html', 'utf8');
            const ext  = (html.match(/<script[^>]+src=/g) || []).length;
            if (ext > 0) {
              console.error('FAIL: ' + ext + ' external script(s) found — must use SRI or be inlined');
              process.exit(1);
            }
            console.log('PASS: Zero external script dependencies');
          "

      - name: Verify DOMPurify is embedded (no CDN dependency)
        run: |
          node -e "
            const fs   = require('fs');
            const html = fs.readFileSync('index.html', 'utf8');
            if (!html.includes('DOMPurify')) {
              console.error('FAIL: DOMPurify not found in index.html');
              process.exit(1);
            }
            console.log('PASS: DOMPurify is embedded inline');
          "

  ## ── 5. HTML Security Validation ─────────────────────────────────────────
  html-security:
    name: HTML Security Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate security headers in HTML
        run: node scripts/security-check.js

      - name: Check for dangerous JS patterns
        run: |
          node -e "
            const fs = require('fs');
            const html = fs.readFileSync('index.html', 'utf8');
            const js   = html.substring(html.indexOf('<script>'));
            const dangerous = [
              [/\beval\s*\(/,           'eval() call'],
              [/document\.write\s*\(/,  'document.write()'],
              [/innerHTML\s*=\s*location\./, 'location in innerHTML'],
              [/innerHTML\s*=\s*window\.name/, 'window.name in innerHTML'],
            ];
            let found = 0;
            dangerous.forEach(([re, name]) => {
              if (re.test(js)) { console.error('FAIL: ' + name); found++; }
            });
            if (found === 0) console.log('PASS: No dangerous JS patterns');
            else process.exit(1);
          "

  ## ── Summary ──────────────────────────────────────────────────────────────
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [security-audit, secret-scan, codeql, dependency-audit, html-security]
    if: always()
    steps:
      - name: Report status
        run: |
          echo "═══════════════════════════════════════"
          echo "  GeoLearn Security Scan Summary"
          echo "═══════════════════════════════════════"
          echo "  Header Audit : ${{ needs.security-audit.result }}"
          echo "  Secret Scan  : ${{ needs.secret-scan.result }}"
          echo "  CodeQL       : ${{ needs.codeql.result }}"
          echo "  Dep Audit    : ${{ needs.dependency-audit.result }}"
          echo "  HTML Scan    : ${{ needs.html-security.result }}"
          echo "═══════════════════════════════════════"
          if [[ "${{ needs.security-audit.result }}"   != "success" ]] || \
             [[ "${{ needs.dependency-audit.result }}" != "success" ]] || \
             [[ "${{ needs.html-security.result }}"    != "success" ]]; then
            echo "❌ One or more security checks FAILED"
            exit 1
          fi
          echo "✅ All security checks passed"
