## ═══════════════════════════════════════════════════════════════
## GeoLearn Japan — Security CI Pipeline
## Runs on every push, PR, and weekly schedule.
## Implements: CodeQL · Secret Scanning · Security Header Audit ·
##             Dependency Audit · HTML Security Validation
## ═══════════════════════════════════════════════════════════════

name: Security Scan

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main
  schedule:
    ## Weekly scan every Monday 09:00 JST (00:00 UTC)
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      scan_level:
        description: 'Scan intensity'
        required: false
        default: 'standard'
        type: choice
        options:
          - standard
          - deep

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  ## ── 1. Security Header & CSP Validation ─────────────────────────────────
  security-audit:
    name: Security Header Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run security checks
        run: node scripts/security-check.js

      - name: Verify CSP hashes match inline scripts
        run: node scripts/verify-csp-hashes.js

      - name: Check for HTTP resources (mixed content)
        run: |
          echo "Checking for non-HTTPS external resources..."
          if grep -oP '(?:src|href)=["\']http://[^"'\'']+' index.html; then
            echo "❌ Found HTTP (non-secure) resources!"
            exit 1
          else
            echo "✅ All external resources use HTTPS"
          fi

      - name: Check for inline event handlers
        run: |
          echo "Checking for inline onclick/onerror handlers in HTML body..."
          SCRIPT_LINE=$(grep -n '<script>' index.html | head -1 | cut -d: -f1)
          if [ -z "$SCRIPT_LINE" ]; then
            echo "No script tag found"
            exit 1
          fi
          VIOLATIONS=$(head -n "$SCRIPT_LINE" index.html | grep -cE '\bon(click|load|error|mouseover|keydown|change|submit)=' || true)
          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "❌ Found $VIOLATIONS inline event handler(s) in HTML!"
            head -n "$SCRIPT_LINE" index.html | grep -nE '\bon(click|load|error|mouseover)='
            exit 1
          else
            echo "✅ No inline event handlers found"
          fi

  ## ── 2. Secret Scanning ──────────────────────────────────────────────────
  secret-scan:
    name: Secret & API Key Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for secret detection)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Check for common secret patterns
        run: |
          echo "Scanning for common secret patterns..."
          PATTERNS=(
            "api[_-]?key"
            "secret[_-]?key"
            "private[_-]?key"
            "password\s*="
            "token\s*="
            "AKIA[0-9A-Z]{16}"  # AWS access key
            "sk-[a-zA-Z0-9]{32}"  # OpenAI API key pattern
          )
          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(grep -rniP "$pattern" index.html src/ 2>/dev/null | grep -v "//.*$pattern" | wc -l || true)
            if [ "$MATCHES" -gt 0 ]; then
              echo "⚠️  Pattern '$pattern' found $MATCHES time(s) — review required"
              FOUND=$((FOUND + 1))
            fi
          done
          if [ "$FOUND" -eq 0 ]; then
            echo "✅ No secret patterns detected"
          fi

  ## ── 3. CodeQL Static Analysis ───────────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-and-quality
          ## Custom query suites for web security
          config: |
            query-filters:
              - include:
                  tags contain: security
              - include:
                  tags contain: correctness

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"
          output: codeql-results
          upload: always

  ## ── 4. Dependency Vulnerability Audit ───────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Audit npm dependencies
        run: |
          echo "Running npm audit..."
          npm audit --audit-level=moderate --json > audit-report.json || true
          node -e "
            const report = require('./audit-report.json');
            const meta = report.metadata || {};
            const vulns = meta.vulnerabilities || {};
            console.log('Vulnerability summary:');
            console.log('  Critical:', vulns.critical || 0);
            console.log('  High:    ', vulns.high || 0);
            console.log('  Moderate:', vulns.moderate || 0);
            console.log('  Low:     ', vulns.low || 0);
            const critical = vulns.critical || 0;
            const high = vulns.high || 0;
            if (critical > 0 || high > 0) {
              console.error('❌ Critical or high vulnerabilities found!');
              process.exit(1);
            }
            console.log('✅ No critical/high vulnerabilities');
          "

      - name: Check for outdated security-critical packages
        run: |
          echo "Checking DOMPurify version..."
          DOMPURIFY_VERSION=$(node -e "console.log(require('./node_modules/dompurify/package.json').version)" 2>/dev/null || echo "not installed")
          echo "DOMPurify installed: $DOMPURIFY_VERSION"
          ## Ensure DOMPurify is not older than 3.0.0
          node -e "
            const v = '$DOMPURIFY_VERSION';
            if (v === 'not installed') { console.log('⚠️  DOMPurify not in node_modules (embedded inline — OK)'); process.exit(0); }
            const [major] = v.split('.').map(Number);
            if (major < 3) { console.error('❌ DOMPurify ' + v + ' is outdated — use 3.x'); process.exit(1); }
            console.log('✅ DOMPurify ' + v + ' is current');
          "

  ## ── 5. HTML Security Validation ─────────────────────────────────────────
  html-security:
    name: HTML Security Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate security headers in HTML
        run: |
          node -e "
          const fs = require('fs');
          const html = fs.readFileSync('index.html', 'utf8');
          const checks = [
            ['DOMPurify embedded', html.includes('DOMPurify')],
            ['Hash-based CSP (no unsafe-inline for scripts)',
              html.includes(\"script-src\") &&
              !html.includes(\"script-src 'unsafe-inline'\") &&
              !html.includes(\"script-src *\")],
            ['CSP default-src none', html.includes(\"default-src 'none'\")],
            ['CSP connect-src none', html.includes(\"connect-src 'none'\")],
            ['CSP object-src none', html.includes(\"object-src 'none'\")],
            ['CSP base-uri self', html.includes(\"base-uri 'self'\")],
            ['CSP block-all-mixed-content', html.includes('block-all-mixed-content')],
            ['CSP upgrade-insecure-requests', html.includes('upgrade-insecure-requests')],
            ['X-Frame-Options DENY', html.includes('X-Frame-Options') && html.includes('DENY')],
            ['X-Content-Type-Options nosniff', html.includes('nosniff')],
            ['Referrer-Policy strict-origin', html.includes('strict-origin-when-cross-origin')],
            ['Permissions-Policy present', html.includes('Permissions-Policy')],
            ['No onclick in HTML body', (() => {
              const s = html.indexOf('<script>');
              return (html.substring(0, s).match(/onclick=/g) || []).length === 0;
            })()],
            ['Delegated click handler', html.includes('CSP-compatible delegated click handler')],
            ['Trusted Types policy', html.includes('trustedTypes.createPolicy')],
            ['Prototype pollution guard', html.includes('Prototype pollution')],
            ['strict-dynamic in CSP', html.includes(\"'strict-dynamic'\")],
            ['Google Fonts preconnect', html.includes('preconnect') && html.includes('fonts.gstatic.com')],
          ];
          let failed = 0;
          checks.forEach(([name, pass]) => {
            console.log((pass ? '✅' : '❌') + ' ' + name);
            if (!pass) failed++;
          });
          console.log('\n' + (checks.length - failed) + '/' + checks.length + ' checks passed');
          if (failed > 0) process.exit(1);
          "

      - name: Check for dangerous patterns
        run: |
          node -e "
          const fs = require('fs');
          const html = fs.readFileSync('index.html', 'utf8');
          const scriptStart = html.indexOf('<script>');
          const scriptEnd = html.lastIndexOf('</script>');
          const js = html.substring(scriptStart, scriptEnd);

          const dangerous = [
            [/\beval\s*\(/, 'eval() call'],
            [/new\s+Function\s*\(/, 'new Function() call'],
            [/document\.write\s*\(/, 'document.write() call'],
            [/innerHTML\s*=\s*location\./, 'location object in innerHTML'],
            [/innerHTML\s*=\s*window\.name/, 'window.name in innerHTML'],
          ];

          let found = 0;
          dangerous.forEach(([pattern, name]) => {
            if (pattern.test(js)) {
              console.error('❌ DANGEROUS PATTERN: ' + name);
              found++;
            }
          });

          if (found === 0) {
            console.log('✅ No dangerous JS patterns found');
          } else {
            process.exit(1);
          }
          "

  ## ── Summary ──────────────────────────────────────────────────────────────
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [security-audit, secret-scan, codeql, dependency-audit, html-security]
    if: always()
    steps:
      - name: Report status
        run: |
          echo "═══════════════════════════════════════"
          echo "  GeoLearn Security Scan Summary"
          echo "═══════════════════════════════════════"
          echo "  Header Audit: ${{ needs.security-audit.result }}"
          echo "  Secret Scan:  ${{ needs.secret-scan.result }}"
          echo "  CodeQL:       ${{ needs.codeql.result }}"
          echo "  Dep Audit:    ${{ needs.dependency-audit.result }}"
          echo "  HTML Scan:    ${{ needs.html-security.result }}"
          echo "═══════════════════════════════════════"
          if [[ "${{ needs.security-audit.result }}" != "success" ]] || \
             [[ "${{ needs.html-security.result }}" != "success" ]] || \
             [[ "${{ needs.dependency-audit.result }}" != "success" ]]; then
            echo "❌ One or more security checks FAILED"
            exit 1
          fi
          echo "✅ All security checks passed"
