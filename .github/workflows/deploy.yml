## ═══════════════════════════════════════════════════════════════
## GeoLearn Japan — GitHub Pages Deployment Pipeline
## Deploys the static app to https://golem7x.github.io/GeoLearn-Japan/
## ═══════════════════════════════════════════════════════════════

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
      - "claude/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

## Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  ## ── Build & Upload Artifact ───────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build (recompute CSP hashes)
        run: node secure-build.js

      - name: Stage deployment files
        run: |
          mkdir -p _site
          cp index.html _site/
          cp _headers _site/ 2>/dev/null || true
          cp -r content _site/ 2>/dev/null || true
          cp -r flashcards _site/ 2>/dev/null || true
          cp -r study _site/ 2>/dev/null || true
          cp -r languages _site/ 2>/dev/null || true
          cp -r vocabulary _site/ 2>/dev/null || true
          cp -r assets _site/ 2>/dev/null || true

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  ## ── Deploy ────────────────────────────────────────────────────────────────
  ## Only deploy to GitHub Pages from master — claude/** branches just verify the build
  deploy:
    name: Deploy
    if: github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
